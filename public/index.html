<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data List</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <div class="container">
        <h1>My Notes</h1>
        <form id="edit-form" hidden>
            <h4>Edit Your Note</h4>
            <input type="hidden" class="edit-input-el">
            <textarea id="edit-field" rows="10" required></textarea>
            <button type="submit" class="updateBtn">Save</button>
        </form>
        <div id="">
            <ul id="data-list"></ul>
            <form id="data-form">
                <input type="text" id="data-input" placeholder="Enter new data" required>
                <button type="submit" class="addBtn">Add Data</button>
            </form>
        </div>
    </div>
    <script src="./assets/js/script.js"></script>
</body>

</html>
